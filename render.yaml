services:
  - type: web
    name: lehem-discord-bot
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: DISCORD_TOKEN
        sync: false
      - key: CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: DASHBOARD_BASE_URL
        sync: false
      - key: PREMIUM_GUILD_IDS
        value: 1498364398279065750,1505251555689893978
      - key: WELCOME_CHANNEL_ID
        sync: false
      - key: VERIFIED_ROLE_ID
        sync: false
